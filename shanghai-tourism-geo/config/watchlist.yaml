# 上海景点观察名单（watchlist）— 本项目的"实体"= 景点
# ─────────────────────────────────────────────────────────────────────────
# 设计理由（红线 #1 证据优先 / #2 可复现）：
#   named_brands 字段（引擎通用）在本项目承载【景点实体】。证据级抽取**只**匹配本名单词条
#   —— 确定性、可复现、可审计；不靠 LLM 做 NER（会幻觉、不可复现，污染证据层）。
#   景点占答率 / 提及率 / 首选推荐率 = 对这些词条在【存档的豆包回答】里的纯函数统计。
#
# ⚠️ STARTER，需与你一起策展：名单外的景点不会被算作证据级实体；"发现名单外新景点"
#   = recon 阶段的 candidate-discovery，单独标注"候选/待确认"，绝不冒充 ground truth。
#   aliases：同一景点的多种写法，命中任一即记为该景点的 canonical name。
#   外地客(A)与本地客(C)共享同一景点宇宙（YAML anchor）；入境客(B)用英文名。
# ─────────────────────────────────────────────────────────────────────────

